appId: ${APP_ID}
---
# Navigate to Calendar tab (middle of tab bar)
- tapOn:
    point: "50%,94%"
- waitForAnimationToEnd:
    timeout: 3000
# Wait for the calendar screen to fully load
- extendedWaitUntil:
    visible:
      id: "add-log-button"
    timeout: 10000
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: "${LOCALE}/02-calendar"
