appId: ${APP_ID}
---
# Already on Calendar tab from previous flow
# Wait for record list to appear (today has seed records)
- extendedWaitUntil:
    visible:
      id: "record-list-item"
    timeout: 10000
# Tap the first record to open details modal
- tapOn:
    id: "record-list-item"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: "${LOCALE}/03-details"
# Close the details modal
- extendedWaitUntil:
    visible:
      id: "header-close-button"
    timeout: 3000
- tapOn:
    id: "header-close-button"
- waitForAnimationToEnd:
    timeout: 1000
