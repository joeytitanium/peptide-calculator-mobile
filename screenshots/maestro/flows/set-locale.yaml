appId: ${APP_ID}
---
# Set up screenshot environment (deep link sets language, screenshot mode, color scheme)
- launchApp
- waitForAnimationToEnd:
    timeout: 3000
- openLink: "peptide-calculator://dev/set-locale?lang=${LOCALE}&colorScheme=light"
# Wait for redirect (100ms delay) and all navigation to settle on calculator screen
- waitForAnimationToEnd:
    timeout: 20000
