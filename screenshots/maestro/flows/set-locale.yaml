appId: ${APP_ID}
---
# Set up screenshot environment
- launchApp
- waitForAnimationToEnd:
    timeout: 3000
- openLink: "headache-tracker://dev/set-locale?lang=${LOCALE}&colorScheme=light&seed=true"
- waitForAnimationToEnd:
    timeout: 8000
# Index redirects to dashboard after setup
- extendedWaitUntil:
    visible:
      id: "dashboard-screen"
    timeout: 15000

# Navigate to Settings tab (right side of tab bar)
- tapOn:
    point: "75%,97%"
- waitForAnimationToEnd:
    timeout: 2000

# Tap on Language row
- tapOn:
    id: "settings-language-row"
- waitForAnimationToEnd:
    timeout: 2000

# Scroll down to make sure all locales are visible, then select the desired one
- scrollUntilVisible:
    element:
      id: "locale-picker-${LOCALE}"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "locale-picker-${LOCALE}"
- waitForAnimationToEnd:
    timeout: 2000

# After selecting locale, we're back on Settings screen.
# Re-seed data so records use the new locale's translations and fresh timestamps.
- scrollUntilVisible:
    element:
      id: "settings-seed-data-row"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "settings-seed-data-row"
- waitForAnimationToEnd:
    timeout: 1000
# Dismiss the "Seed Data" confirmation alert
- tapOn: "OK"
- waitForAnimationToEnd:
    timeout: 1000

# Navigate to Dashboard tab (left side of tab bar)
# Going here AFTER locale change so dashboard initializes with correct weekStartsOn
- tapOn:
    point: "17%,97%"
- waitForAnimationToEnd:
    timeout: 2000

# Wait for dashboard screen to be fully loaded with new locale
- extendedWaitUntil:
    visible:
      id: "dashboard-screen"
    timeout: 10000
